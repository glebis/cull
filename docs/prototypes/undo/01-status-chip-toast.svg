<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cull undo status chip and toast prototype</title>
  <desc id="desc">Tokyo Night desktop interface showing compact undo and redo feedback chips over the image viewer.</desc>
  <style>
    :root {
      --bg: #08080c;
      --surface: #0c0c12;
      --border: #1a1a2e;
      --text: #e0e0e0;
      --text-secondary: #7a7fa0;
      --blue: #7aa2f7;
      --green: #9ece6a;
      --orange: #e0af68;
      --purple: #bb9af7;
      --red: #f7768e;
      --spacing: 8px;
      --radius: 4px;
    }
    * { box-sizing: border-box; }
    text {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      fill: var(--text);
      letter-spacing: 0;
    }
    .bg { fill: var(--bg); }
    .surface { fill: var(--surface); }
    .line { stroke: var(--border); stroke-width: 1; }
    .soft-line { stroke: var(--border); stroke-width: 1; opacity: .72; }
    .muted { fill: var(--text-secondary); }
    .blue { fill: var(--blue); }
    .green { fill: var(--green); }
    .orange { fill: var(--orange); }
    .purple { fill: var(--purple); }
    .red { fill: var(--red); }
    .label { font-size: 13px; }
    .tiny { font-size: 11px; }
    .body { font-size: 15px; }
    .title { font-size: 19px; font-weight: 700; }
    .thumb { fill: #101018; stroke: var(--border); stroke-width: 1; rx: 4; }
    .chip { fill: #0f0f18; stroke: var(--border); stroke-width: 1; rx: 4; }
    .button { fill: #11111b; stroke: var(--border); stroke-width: 1; rx: 4; }
    .disabled { opacity: .38; }
  </style>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>

  <rect class="surface" x="0" y="0" width="1600" height="56"/>
  <line class="line" x1="0" y1="56" x2="1600" y2="56"/>
  <text class="title" x="24" y="35">Cull</text>
  <text class="label muted" x="86" y="35">Library / AI Art / June curation</text>

  <rect class="button" x="1144" y="12" width="88" height="32"/>
  <path d="M1164 29c0-6 5-11 11-11h9m-20 11 8-8m-8 8 8 8" fill="none" stroke="#7aa2f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="label blue" x="1194" y="33">Undo</text>
  <rect class="button disabled" x="1240" y="12" width="88" height="32"/>
  <path d="M1266 29c0-6-5-11-11-11h-9m20 11-8-8m8 8-8 8" fill="none" stroke="#7a7fa0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="label muted" x="1288" y="33">Redo</text>
  <rect class="chip disabled" x="1344" y="12" width="156" height="32"/>
  <text class="label muted" x="1360" y="33">No redo available</text>

  <rect class="surface" x="0" y="56" width="260" height="944"/>
  <line class="line" x1="260" y1="56" x2="260" y2="1000"/>
  <text class="label muted" x="24" y="94">SECTIONS</text>
  <rect x="16" y="112" width="228" height="36" rx="4" fill="#11111b" stroke="#1a1a2e"/>
  <text class="body" x="32" y="135">All Images</text>
  <text class="label muted" x="204" y="135">2846</text>
  <text class="body muted" x="32" y="184">Favorites</text>
  <text class="body muted" x="32" y="224">Needs Review</text>
  <text class="body muted" x="32" y="264">Rejected</text>
  <text class="label muted" x="24" y="326">SMART COLLECTIONS</text>
  <text class="body muted" x="32" y="366">rating &gt;= 4</text>
  <text class="body muted" x="32" y="406">source: Midjourney</text>
  <text class="body muted" x="32" y="446">last 7 days</text>

  <rect x="260" y="56" width="1340" height="64" fill="#09090e"/>
  <line class="line" x1="260" y1="120" x2="1600" y2="120"/>
  <text class="label muted" x="288" y="94">2846 images</text>
  <rect class="chip" x="420" y="72" width="156" height="32"/>
  <text class="label green" x="436" y="93">Decision: keep</text>
  <rect class="chip" x="588" y="72" width="120" height="32"/>
  <text class="label orange" x="604" y="93">Rating 4+</text>
  <rect class="chip" x="720" y="72" width="164" height="32"/>
  <text class="label purple" x="736" y="93">Collection: cover</text>

  <g opacity=".96">
    <rect class="thumb" x="292" y="152" width="236" height="168"/>
    <rect x="308" y="168" width="96" height="136" rx="3" fill="#151523"/>
    <rect x="420" y="188" width="88" height="42" rx="3" fill="#1a1a2e"/>
    <rect x="420" y="246" width="64" height="58" rx="3" fill="#111827"/>
    <text class="tiny muted" x="306" y="348">aurora-courtyard.png</text>
    <text class="tiny orange" x="468" y="348">rating 4</text>

    <rect class="thumb" x="556" y="152" width="236" height="168"/>
    <rect x="572" y="172" width="204" height="40" rx="3" fill="#111827"/>
    <rect x="596" y="232" width="76" height="72" rx="3" fill="#1a1a2e"/>
    <rect x="692" y="232" width="60" height="72" rx="3" fill="#151523"/>
    <text class="tiny muted" x="570" y="348">neon-cathedral.png</text>
    <text class="tiny green" x="734" y="348">keep</text>

    <rect class="thumb" x="820" y="152" width="236" height="168"/>
    <rect x="836" y="170" width="92" height="132" rx="3" fill="#1a1a2e"/>
    <rect x="944" y="170" width="92" height="132" rx="3" fill="#101018"/>
    <text class="tiny muted" x="834" y="348">glass-orchard.png</text>
    <text class="tiny purple" x="982" y="348">cover set</text>

    <rect class="thumb" x="1084" y="152" width="236" height="168"/>
    <rect x="1100" y="168" width="204" height="136" rx="3" fill="#11111b"/>
    <path d="M1116 288h172l-44-58-36 34-28-42z" fill="#1a1a2e"/>
    <text class="tiny muted" x="1098" y="348">field-recording.png</text>
    <text class="tiny red" x="1258" y="348">reject</text>

    <rect class="thumb" x="292" y="392" width="236" height="168"/>
    <rect x="308" y="408" width="204" height="136" rx="3" fill="#101018"/>
    <circle cx="378" cy="468" r="42" fill="#1a1a2e"/>
    <text class="tiny muted" x="306" y="588">quiet-machine.png</text>
    <text class="tiny blue" x="456" y="588">moved</text>

    <rect class="thumb" x="556" y="392" width="236" height="168"/>
    <rect x="572" y="408" width="204" height="136" rx="3" fill="#111827"/>
    <rect x="604" y="430" width="140" height="26" rx="3" fill="#1a1a2e"/>
    <rect x="604" y="474" width="88" height="52" rx="3" fill="#151523"/>
    <text class="tiny muted" x="570" y="588">room-for-signal.png</text>
    <text class="tiny orange" x="742" y="588">rating 5</text>
  </g>

  <g>
    <rect class="chip" x="494" y="818" width="612" height="72"/>
    <rect x="510" y="834" width="40" height="40" rx="4" fill="#151523" stroke="#1a1a2e"/>
    <path d="M538 854c0-5-4-9-9-9h-7m16 9-7-7m7 7-7 7" fill="none" stroke="#7aa2f7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="body" x="568" y="852">Undid rating change</text>
    <text class="label muted" x="568" y="875">aurora-courtyard.png changed from 5 to 4</text>
    <rect x="982" y="838" width="92" height="32" rx="4" fill="#11111b" stroke="#1a1a2e"/>
    <text class="label blue" x="1010" y="859">Redo</text>
  </g>

  <g opacity=".92">
    <rect class="chip" x="548" y="734" width="504" height="56"/>
    <rect x="564" y="750" width="24" height="24" rx="4" fill="#151523" stroke="#1a1a2e"/>
    <path d="M571 762h10m-5-5 5 5-5 5" fill="none" stroke="#9ece6a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label" x="604" y="765">Redid decision</text>
    <text class="tiny muted" x="604" y="782">neon-cathedral.png returned to Keep</text>
    <text class="label blue" x="996" y="765">Undo</text>
  </g>

  <g opacity=".48">
    <rect class="chip" x="648" y="908" width="304" height="40"/>
    <text class="label muted" x="674" y="933">Undo history empty after this point</text>
  </g>

  <text class="tiny muted" x="292" y="966">Prototype 01: compact status chip / toast for reversible rating, decision, collection, and file actions</text>
</svg>

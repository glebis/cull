name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Published version without the leading v
        required: true
        type: string
      dmg_sha256:
        description: Verified SHA-256 for the public aarch64 DMG
        required: true
        type: string
      provenance_url:
        description: Public release-provenance.json asset URL
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: homebrew-cull-${{ inputs.version || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  update-cask:
    runs-on: macos-14
    steps:
      - name: Verify public provenance and DMG before tap access
        id: verified
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DMG_SHA256: ${{ inputs.dmg_sha256 }}
          INPUT_PROVENANCE_URL: ${{ inputs.provenance_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/homebrew-promotion.json"
          write_failure() {
            FAILURE_CODE="$1" EVIDENCE="$evidence" node <<'NODE'
          const fs = require('node:fs');
          const evidence = {
            schema: 'cull.release.homebrew-promotion.v1',
            version: process.env.VERSION || null,
            tag: process.env.VERSION ? `v${process.env.VERSION}` : null,
            state: 'failed',
            failure: { code: process.env.FAILURE_CODE },
          };
          fs.writeFileSync(process.env.EVIDENCE, `${JSON.stringify(evidence, null, 2)}\n`, { mode: 0o600 });
          NODE
          }
          on_error() {
            local status=$?
            write_failure "$failure_code"
            exit "$status"
          }
          failure_code=INPUT_INVALID
          trap on_error ERR

          case "$EVENT_NAME" in
            workflow_dispatch)
              VERSION="$INPUT_VERSION"
              EXPECTED_SHA="$INPUT_DMG_SHA256"
              PROVENANCE_URL="$INPUT_PROVENANCE_URL"
              ;;
            release)
              VERSION="${RELEASE_TAG#v}"
              EXPECTED_SHA=''
              PROVENANCE_URL="https://github.com/$REPOSITORY/releases/download/v$VERSION/release-provenance.json"
              ;;
            *) exit 2 ;;
          esac
          export VERSION
          [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ -z "$EXPECTED_SHA" || "$EXPECTED_SHA" =~ ^[0-9a-f]{64}$ ]]
          expected_provenance="https://github.com/$REPOSITORY/releases/download/v$VERSION/release-provenance.json"
          test "$PROVENANCE_URL" = "$expected_provenance"

          failure_code=MISSING_PROVENANCE
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://api.github.com/repos/$REPOSITORY/releases/tags/v$VERSION" \
            --output "$RUNNER_TEMP/public-release.json"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "$PROVENANCE_URL" --output "$RUNNER_TEMP/release-provenance.json"

          failure_code=PROVENANCE_INVALID
          if VERSION="$VERSION" EXPECTED_SHA="$EXPECTED_SHA" \
            RELEASE_JSON="$RUNNER_TEMP/public-release.json" \
            PROVENANCE="$RUNNER_TEMP/release-provenance.json" \
            VALIDATED="$RUNNER_TEMP/validated-promotion.json" node <<'NODE'
          const fs = require('node:fs');
          const release = JSON.parse(fs.readFileSync(process.env.RELEASE_JSON, 'utf8'));
          const provenance = JSON.parse(fs.readFileSync(process.env.PROVENANCE, 'utf8'));
          const dmgName = `Cull_${process.env.VERSION}_aarch64.dmg`;
          const expectedAssets = [dmgName, 'Cull_aarch64.app.tar.gz', 'Cull_aarch64.app.tar.gz.sig', 'latest.json'].sort();
          const expectedPublic = [...expectedAssets, 'release-provenance.json', 'checksums.txt'].sort();
          const expectedChecks = [
            'exactInventory', 'updaterMetadata', 'updaterSignature', 'dmgMountedReadOnly',
            'embeddedVersion', 'arm64Only', 'codeSignature', 'gatekeeper', 'stapledNotarization',
          ].sort();
          if (release.tag_name !== `v${process.env.VERSION}` || release.draft !== false || release.prerelease !== false ||
              JSON.stringify(release.assets.map(({ name }) => name).sort()) !== JSON.stringify(expectedPublic)) process.exit(2);
          if (provenance.schema !== 'cull.release.provenance.v1' ||
              provenance.version !== process.env.VERSION ||
              provenance.tag !== `v${process.env.VERSION}` ||
              !/^[0-9a-f]{40}$/.test(provenance.commit) ||
              !/^[0-9a-f]{40}$/.test(provenance.tagObjectSha) ||
              !Number.isSafeInteger(provenance.workflowRunId) || provenance.workflowRunId < 1 ||
              !provenance.assets ||
              JSON.stringify(Object.keys(provenance.assets).sort()) !== JSON.stringify(expectedAssets) ||
              !provenance.checks ||
              JSON.stringify(Object.keys(provenance.checks).sort()) !== JSON.stringify(expectedChecks) ||
              expectedChecks.some((name) => provenance.checks[name] !== true)) process.exit(2);
          for (const name of expectedAssets) {
            const asset = provenance.assets[name];
            if (!asset || !/^[0-9a-f]{64}$/.test(asset.sha256) || !Number.isSafeInteger(asset.size) || asset.size < 1) process.exit(2);
          }
          const digest = provenance.assets[dmgName]?.sha256;
          if (process.env.EXPECTED_SHA && digest !== process.env.EXPECTED_SHA) process.exit(3);
          const publicDmg = release.assets.find(({ name }) => name === dmgName);
          if (!publicDmg || publicDmg.state !== 'uploaded' || publicDmg.size !== provenance.assets[dmgName].size ||
              publicDmg.digest !== `sha256:${digest}`) process.exit(2);
          fs.writeFileSync(process.env.VALIDATED, JSON.stringify({
            version: process.env.VERSION,
            digest,
            dmgUrl: publicDmg.browser_download_url,
          }));
          NODE
          then
            validation_status=0
          else
            validation_status=$?
          fi
          if [ "$validation_status" -eq 3 ]; then
            trap - ERR
            write_failure DMG_SHA_MISMATCH
            echo 'DMG_SHA_MISMATCH: requested digest does not match public provenance' >&2
            exit 2
          fi
          if [ "$validation_status" -ne 0 ]; then
            false
          fi

          DMG_SHA256=$(VALIDATED="$RUNNER_TEMP/validated-promotion.json" node -e \
            "const x=require(process.env.VALIDATED); process.stdout.write(x.digest)")
          DMG_URL=$(VALIDATED="$RUNNER_TEMP/validated-promotion.json" node -e \
            "const x=require(process.env.VALIDATED); process.stdout.write(x.dmgUrl)")
          expected_dmg="https://github.com/$REPOSITORY/releases/download/v$VERSION/Cull_${VERSION}_aarch64.dmg"
          test "$DMG_URL" = "$expected_dmg"

          failure_code=DMG_DOWNLOAD_FAILED
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "$DMG_URL" --output "$RUNNER_TEMP/Cull_${VERSION}_aarch64.dmg"
          ACTUAL_SHA=$(shasum -a 256 "$RUNNER_TEMP/Cull_${VERSION}_aarch64.dmg" | awk '{print $1}')
          if [ "$ACTUAL_SHA" != "$DMG_SHA256" ]; then
            trap - ERR
            write_failure DMG_SHA_MISMATCH
            echo "DMG_SHA_MISMATCH: downloaded DMG does not match published provenance" >&2
            exit 2
          fi

          trap - ERR
          VERSION="$VERSION" DMG_SHA256="$DMG_SHA256" EVIDENCE="$evidence" node <<'NODE'
          const fs = require('node:fs');
          fs.writeFileSync(process.env.EVIDENCE, `${JSON.stringify({
            schema: 'cull.release.homebrew-promotion.v1',
            version: process.env.VERSION,
            tag: `v${process.env.VERSION}`,
            state: 'artifact-verified',
            dmgSha256: process.env.DMG_SHA256,
            failure: null,
          }, null, 2)}\n`, { mode: 0o600 });
          NODE
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_sha256=$DMG_SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout tap after public artifact verification
        id: checkout_tap
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: glebis/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update, audit, install, launch, and push cask
        shell: bash
        env:
          VERSION: ${{ steps.verified.outputs.version }}
          DMG_SHA256: ${{ steps.verified.outputs.dmg_sha256 }}
          CHECKOUT_OUTCOME: ${{ steps.checkout_tap.outcome }}
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/homebrew-promotion.json"
          write_failure() {
            FAILURE_CODE="$1" EVIDENCE="$evidence" VERSION="$VERSION" DMG_SHA256="$DMG_SHA256" node <<'NODE'
          const fs = require('node:fs');
          fs.writeFileSync(process.env.EVIDENCE, `${JSON.stringify({
            schema: 'cull.release.homebrew-promotion.v1', version: process.env.VERSION,
            tag: `v${process.env.VERSION}`, state: 'failed', dmgSha256: process.env.DMG_SHA256,
            failure: { code: process.env.FAILURE_CODE },
          }, null, 2)}\n`, { mode: 0o600 });
          NODE
          }
          fail() {
            local code=$1
            write_failure "$code"
            trap - ERR
            echo "$code: Homebrew promotion failed" >&2
            exit 2
          }
          on_error() {
            local status=$?
            write_failure "$failure_code"
            exit "$status"
          }
          failure_code=PROMOTION_FAILED
          trap on_error ERR
          if [ "$CHECKOUT_OUTCOME" != success ]; then
            fail TAP_CHECKOUT_FAILED
          fi
          cask=tap/Casks/cull.rb
          if grep -Eq '^sha256[[:space:]]+:no_check[[:space:]]*$' "$cask"; then
            fail CASK_NO_CHECK
          fi

          failure_code=CASK_INVALID
          CASK="$cask" VERSION="$VERSION" DMG_SHA256="$DMG_SHA256" node <<'NODE'
          const fs = require('node:fs');
          const path = process.env.CASK;
          const stat = fs.lstatSync(path);
          if (!stat.isFile() || stat.isSymbolicLink()) process.exit(2);
          const source = fs.readFileSync(path, 'utf8');
          if (source.includes('sha256 :no_check')) process.exit(2);
          const versionPattern = /^(\s*)version\s+"([^"]+)"\s*$/gm;
          const shaPattern = /^(\s*)sha256\s+"([0-9a-f]{64})"\s*$/gm;
          const versionMatches = [...source.matchAll(versionPattern)];
          const shaMatches = [...source.matchAll(shaPattern)];
          if (versionMatches.length !== 1 || shaMatches.length !== 1) process.exit(2);
          const alreadyCurrent = versionMatches[0][2] === process.env.VERSION && shaMatches[0][2] === process.env.DMG_SHA256;
          let updated = source.replace(versionPattern, `$1version "${process.env.VERSION}"`)
            .replace(shaPattern, `$1sha256 "${process.env.DMG_SHA256}"`);
          fs.writeFileSync(path, updated);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${alreadyCurrent ? 'false' : 'true'}\n`);
          if (alreadyCurrent) process.stderr.write('CASK_ALREADY_CURRENT\n');
          NODE

          failure_code=CASK_EDIT_INVALID
          changed=$(tail -1 "$GITHUB_OUTPUT" | cut -d= -f2)
          if [ "$changed" = false ]; then
            git -C tap diff --exit-code -- Casks/cull.rb
          else
            test "$(git -C tap status --short)" = ' M Casks/cull.rb'
            git -C tap diff --check -- Casks/cull.rb
          fi

          tap_commit=$(git -C tap rev-parse HEAD)
          if [ "$changed" = true ]; then
            git -C tap config user.name 'github-actions[bot]'
            git -C tap config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git -C tap add -- Casks/cull.rb
            git -C tap commit -m "chore(cull): pin cask v$VERSION"
            tap_commit=$(git -C tap rev-parse HEAD)
          fi

          failure_code=BREW_TAP_FAILED
          brew tap --custom-remote glebis/tap "file://$PWD/tap"
          failure_code=BREW_AUDIT_FAILED
          brew audit --cask cull
          mkdir -p "$RUNNER_TEMP/cull-apps"
          failure_code=BREW_INSTALL_FAILED
          brew install --cask --appdir="$RUNNER_TEMP/cull-apps" glebis/tap/cull
          app="$RUNNER_TEMP/cull-apps/Cull.app"
          failure_code=BREW_INSTALL_INVALID
          test -d "$app"
          test "$(defaults read "$app/Contents/Info" CFBundleShortVersionString)" = "$VERSION"
          failure_code=BREW_LAUNCH_FAILED
          open -na "$app"
          sleep 5
          osascript -e 'tell application "Cull" to quit' || true

          if [ "$changed" = true ]; then
            failure_code=TAP_PUSH_FAILED
            git -C tap push
          fi
          trap - ERR
          VERSION="$VERSION" DMG_SHA256="$DMG_SHA256" TAP_COMMIT="$tap_commit" EVIDENCE="$evidence" node <<'NODE'
          const fs = require('node:fs');
          fs.writeFileSync(process.env.EVIDENCE, `${JSON.stringify({
            schema: 'cull.release.homebrew-promotion.v1', version: process.env.VERSION,
            tag: `v${process.env.VERSION}`, state: 'homebrew-promoted', dmgSha256: process.env.DMG_SHA256,
            tapCommit: process.env.TAP_COMMIT || null, failure: null,
          }, null, 2)}\n`, { mode: 0o600 });
          NODE

      - name: Upload resumable promotion evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cull-homebrew-promotion-${{ github.run_id }}
          path: ${{ runner.temp }}/homebrew-promotion.json
          if-no-files-found: warn
          retention-days: 14

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated vX.Y.Z tag to release
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    runs-on: macos-14
    outputs:
      version: ${{ steps.release_gate.outputs.version }}
      tag: ${{ steps.release_gate.outputs.tag }}
      sha: ${{ steps.release_gate.outputs.sha }}
      base-tag: ${{ steps.release_gate.outputs.base_tag }}
      e2e-required: ${{ steps.release_gate.outputs.e2e_required }}
      event: ${{ steps.release_gate.outputs.event }}
      publish-eligible: ${{ steps.release_gate.outputs.publish_eligible }}
      gate-artifact-name: cull-release-gate-${{ github.run_id }}-${{ steps.release_gate.outputs.sha }}
    steps:
      - name: Checkout requested release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pinned Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install pinned Rust and audit tooling
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy --target aarch64-apple-darwin
          rustup default 1.95.0
          cargo install cargo-deny --version 0.19.8 --locked
          cargo install cargo-audit --version 0.22.2 --locked

      - name: Install locked project dependencies
        run: npm ci

      - name: Record immutable release gate evidence
        id: release_gate
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tag="$REQUESTED_TAG"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          test "$(git cat-file -t "refs/tags/$tag")" = tag
          sha=$(git rev-parse "refs/tags/$tag^{commit}")
          test "$(git rev-parse HEAD)" = "$sha"
          case "$EVENT_NAME" in
            push)
              test "$EVENT_REF" = "refs/tags/$tag"
              event=tag
              ;;
            workflow_dispatch)
              event=dispatch
              ;;
            *)
              exit 2
              ;;
          esac
          base_tag=$(
            TARGET_TAG="$tag" TARGET_SHA="$sha" node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const exact = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
          const tuple = (tag) => exact.exec(tag)?.slice(1).map(Number);
          const compare = (left, right) => {
            for (let index = 0; index < 3; index += 1) {
              if (left[index] !== right[index]) return left[index] - right[index];
            }
            return 0;
          };
          const target = tuple(process.env.TARGET_TAG);
          if (!target) process.exit(2);
          const names = execFileSync('git', [
            'for-each-ref', `--merged=${process.env.TARGET_SHA}`,
            '--format=%(refname:short)', 'refs/tags',
          ], { encoding: 'utf8' }).trim().split('\n').filter(Boolean);
          const candidates = names.map((name) => ({ name, version: tuple(name) }))
            .filter(({ version }) => version && compare(version, target) < 0)
            .sort((left, right) => compare(right.version, left.version)
              || left.name.localeCompare(right.name));
          if (candidates.length === 0) process.exit(2);
          process.stdout.write(candidates[0].name);
          NODE
          )
          test -n "$base_tag"
          node scripts/release-gate.mjs \
            --tag "$tag" \
            --sha "$sha" \
            --base-tag "$base_tag" \
            --event "$event" \
            --json-out "$RUNNER_TEMP/release-gate.json"

      - name: Run frontend CI contract
        run: npm run ci:frontend

      - name: Run Rust CI contract
        run: npm run ci:rust

      - name: Audit source and dependency licences
        run: npm run audit:licenses

      - name: Run Rust supply-chain policy
        run: bash scripts/supply-chain-audit.sh check

      - name: Verify database compatibility contract
        run: cargo test --manifest-path src-tauri/Cargo.toml --features test-support --test compat_golden

      - name: Verify export compatibility contract
        run: cargo test --manifest-path src-tauri/Cargo.toml --features test-support --test export_compat_golden

      - name: Install pinned browser test client
        if: steps.release_gate.outputs.e2e_required == 'true'
        run: |
          python3 -m venv "$RUNNER_TEMP/cull-e2e-venv"
          "$RUNNER_TEMP/cull-e2e-venv/bin/pip" install --disable-pip-version-check playwright==1.55.0
          echo "$RUNNER_TEMP/cull-e2e-venv/bin" >> "$GITHUB_PATH"

      - name: Run classified browser smoke gate
        if: steps.release_gate.outputs.e2e_required == 'true'
        env:
          CULL_E2E_BROWSER: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
        run: bash tests/e2e/run-e2e.sh

      - name: Build unsigned frontend production bundle
        run: npm run build

      - name: Upload immutable gate record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cull-release-gate-${{ github.run_id }}-${{ steps.release_gate.outputs.sha }}
          path: ${{ runner.temp }}/release-gate.json
          if-no-files-found: error
          retention-days: 14

  signed-build:
    name: Signed build without publication
    needs: release-gate
    runs-on: macos-14
    outputs:
      artifact-name: cull-signed-${{ github.run_id }}-${{ needs.release-gate.outputs.sha }}
      artifact-id: ${{ steps.upload_signed.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload_signed.outputs.artifact-digest }}
      run-id: ${{ github.run_id }}
    steps:
      - name: Assert publish-eligible gate evidence
        env:
          GATE_EVENT: ${{ needs.release-gate.outputs.event }}
          PUBLISH_ELIGIBLE: ${{ needs.release-gate.outputs.publish-eligible }}
        run: |
          case "$GATE_EVENT" in tag|dispatch) ;; *) exit 2 ;; esac
          test "$PUBLISH_ELIGIBLE" = true

      - name: Checkout gate-approved commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-gate.outputs.sha }}
          persist-credentials: false

      - name: Set up pinned Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install pinned Rust target
        run: |
          rustup toolchain install 1.95.0 --profile minimal --target aarch64-apple-darwin
          rustup default 1.95.0

      - name: Install locked project dependencies
        run: npm ci

      - name: Verify signing material is available
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_PASSWORD"
          test -n "$APPLE_TEAM_ID"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/certificate.p12"
          keychain_path="$RUNNER_TEMP/cull-release-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          identity=$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')
          test -n "$identity"
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build signed and notarized artifacts without release inputs
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin --bundles dmg

      - name: Assemble exact private artifact inventory
        env:
          VERSION: ${{ needs.release-gate.outputs.version }}
          TAG: ${{ needs.release-gate.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          bundle="src-tauri/target/aarch64-apple-darwin/release/bundle"
          artifact_dir="$RUNNER_TEMP/cull-signed"
          mkdir -m 700 "$artifact_dir"
          install -m 600 "$bundle/dmg/Cull_${VERSION}_aarch64.dmg" "$artifact_dir/Cull_${VERSION}_aarch64.dmg"
          install -m 600 "$bundle/macos/Cull.app.tar.gz" "$artifact_dir/Cull_aarch64.app.tar.gz"
          install -m 600 "$bundle/macos/Cull.app.tar.gz.sig" "$artifact_dir/Cull_aarch64.app.tar.gz.sig"
          ARTIFACT_DIR="$artifact_dir" node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const archive = 'Cull_aarch64.app.tar.gz';
          const signature = fs.readFileSync(path.join(process.env.ARTIFACT_DIR, `${archive}.sig`), 'utf8').trim();
          const metadata = {
            version: process.env.VERSION,
            platforms: {
              'darwin-aarch64': {
                signature,
                url: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${process.env.TAG}/${archive}`,
              },
            },
          };
          fs.writeFileSync(path.join(process.env.ARTIFACT_DIR, 'latest.json'), `${JSON.stringify(metadata, null, 2)}\n`, {
            encoding: 'utf8', mode: 0o600, flag: 'wx',
          });
          NODE

      - name: Upload exact private signed inventory
        id: upload_signed
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cull-signed-${{ github.run_id }}-${{ needs.release-gate.outputs.sha }}
          path: ${{ runner.temp }}/cull-signed
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  verify-artifact:
    name: Exact artifact verification
    needs: [release-gate, signed-build]
    runs-on: macos-14
    permissions:
      contents: read
      actions: read
    outputs:
      artifact-name: cull-verified-${{ github.run_id }}-${{ needs.release-gate.outputs.sha }}
      artifact-id: ${{ steps.upload_verified.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload_verified.outputs.artifact-digest }}
    steps:
      - name: Checkout gate-approved verifier
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-gate.outputs.sha }}
          persist-credentials: false

      - name: Set up pinned Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Download exact private signed inventory
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.signed-build.outputs.artifact-id }}
          path: ${{ runner.temp }}/cull-signed

      - name: Download immutable gate record
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-gate.outputs.gate-artifact-name }}
          path: ${{ runner.temp }}/cull-release-gate

      - name: Install checksum-pinned minisign
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/minisign-0.12-macos.zip"
          curl --proto '=https' --tlsv1.2 --retry 3 --fail --silent --show-error --location \
            https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-macos.zip \
            --output "$archive"
          printf '%s  %s\n' '89000b19535765f9cffc65a65d64a820f433ef6db8020667f7570e06bf6aac63' "$archive" | shasum -a 256 --check
          mkdir -m 700 "$RUNNER_TEMP/minisign-bin"
          unzip -q "$archive" minisign -d "$RUNNER_TEMP/minisign-bin"
          chmod 755 "$RUNNER_TEMP/minisign-bin/minisign"
          echo "$RUNNER_TEMP/minisign-bin" >> "$GITHUB_PATH"

      - name: Verify and package exact signed artifact set
        env:
          VERSION: ${{ needs.release-gate.outputs.version }}
          TAG: ${{ needs.release-gate.outputs.tag }}
          COMMIT: ${{ needs.release-gate.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/cull-verifier-evidence"
          verified="$RUNNER_TEMP/cull-verified"
          mkdir -m 700 "$evidence" "$verified"
          bash scripts/verify-release-artifacts.sh \
            --artifact-dir "$RUNNER_TEMP/cull-signed" \
            --version "$VERSION" \
            --tag "$TAG" \
            --commit "$COMMIT" \
            --run-id "${{ github.run_id }}" \
            --out "$evidence"
          install -m 600 "$RUNNER_TEMP/cull-release-gate/release-gate.json" "$verified/release-gate.json"
          for name in \
            "Cull_${VERSION}_aarch64.dmg" \
            Cull_aarch64.app.tar.gz \
            Cull_aarch64.app.tar.gz.sig \
            latest.json; do
            install -m 600 "$RUNNER_TEMP/cull-signed/$name" "$verified/$name"
          done
          for name in release-provenance.json checksums.txt verification.log; do
            install -m 600 "$evidence/$name" "$verified/$name"
          done
          (cd "$verified" && shasum -a 256 --check checksums.txt)
          VERIFIED_DIR="$verified" VERSION="$VERSION" node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const names = [
            `Cull_${process.env.VERSION}_aarch64.dmg`,
            'Cull_aarch64.app.tar.gz',
            'Cull_aarch64.app.tar.gz.sig',
            'latest.json',
            'release-provenance.json',
            'checksums.txt',
            'verification.log',
            'release-gate.json',
          ].sort();
          const actual = fs.readdirSync(process.env.VERIFIED_DIR).sort();
          if (JSON.stringify(actual) !== JSON.stringify(names)) process.exit(1);
          for (const name of actual) {
            const stat = fs.lstatSync(path.join(process.env.VERIFIED_DIR, name), { bigint: true });
            if (!stat.isFile() || stat.isSymbolicLink() || stat.nlink !== 1n) process.exit(1);
          }
          NODE

      - name: Upload exact verified release package
        id: upload_verified
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cull-verified-${{ github.run_id }}-${{ needs.release-gate.outputs.sha }}
          path: ${{ runner.temp }}/cull-verified
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    name: Publish verified release
    needs: [release-gate, signed-build, verify-artifact]
    if: >-
      vars.CULL_RELEASE_PUBLISH_ENABLED == 'true' &&
      needs.release-gate.outputs.publish-eligible == 'true' &&
      (needs.release-gate.outputs.event == 'tag' ||
      needs.release-gate.outputs.event == 'dispatch')
    runs-on: macos-14
    environment: release-publish
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout gate-approved release source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-gate.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download exact verified release package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.verify-artifact.outputs.artifact-id }}
          path: ${{ runner.temp }}/cull-verified

      - name: Validate evidence, inventory, checksums, and curated notes
        env:
          VERSION: ${{ needs.release-gate.outputs.version }}
          TAG: ${{ needs.release-gate.outputs.tag }}
          COMMIT: ${{ needs.release-gate.outputs.sha }}
          GATE_EVENT: ${{ needs.release-gate.outputs.event }}
          EXPECTED_RUN_ID: ${{ needs.signed-build.outputs.run-id }}
          VERIFIED_ARTIFACT_DIGEST: ${{ needs.verify-artifact.outputs.artifact-digest }}
        shell: bash
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/cull-verified"
          notes="$RUNNER_TEMP/release-notes.md"
          PACKAGE="$package" NOTES="$notes" node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');
          const expectedAssets = [
            `Cull_${process.env.VERSION}_aarch64.dmg`,
            'Cull_aarch64.app.tar.gz',
            'Cull_aarch64.app.tar.gz.sig',
            'latest.json',
          ];
          const expectedPackage = [...expectedAssets,
            'release-provenance.json', 'checksums.txt', 'verification.log', 'release-gate.json'].sort();
          const actual = fs.readdirSync(process.env.PACKAGE).sort();
          if (JSON.stringify(actual) !== JSON.stringify(expectedPackage)) process.exit(2);
          for (const name of actual) {
            const stat = fs.lstatSync(path.join(process.env.PACKAGE, name), { bigint: true });
            if (!stat.isFile() || stat.isSymbolicLink() || stat.nlink !== 1n) process.exit(2);
          }
          if (!/^[0-9a-f]{64}$/.test(process.env.VERIFIED_ARTIFACT_DIGEST || '')) process.exit(2);
          const gate = JSON.parse(fs.readFileSync(path.join(process.env.PACKAGE, 'release-gate.json'), 'utf8'));
          if (gate.schema !== 'cull.release.gate.v1' || gate.publishEligible !== true ||
              (gate.event !== 'tag' && gate.event !== 'dispatch') || gate.event !== process.env.GATE_EVENT ||
              gate.version !== process.env.VERSION || gate.tag !== process.env.TAG || gate.sha !== process.env.COMMIT) process.exit(2);
          const provenance = JSON.parse(fs.readFileSync(path.join(process.env.PACKAGE, 'release-provenance.json'), 'utf8'));
          if (provenance.schema !== 'cull.release.provenance.v1' || provenance.version !== process.env.VERSION ||
              provenance.tag !== process.env.TAG || provenance.commit !== process.env.COMMIT ||
              provenance.workflowRunId !== process.env.EXPECTED_RUN_ID) process.exit(2);
          if (JSON.stringify(Object.keys(provenance.assets).sort()) !== JSON.stringify([...expectedAssets].sort())) process.exit(2);
          const checksumLines = fs.readFileSync(path.join(process.env.PACKAGE, 'checksums.txt'), 'utf8').trim().split('\n');
          if (checksumLines.length !== expectedAssets.length) process.exit(2);
          const checksums = new Map();
          for (const line of checksumLines) {
            const match = /^([0-9a-f]{64})  ([A-Za-z0-9._-]+)$/.exec(line);
            if (!match || checksums.has(match[2])) process.exit(2);
            checksums.set(match[2], match[1]);
          }
          for (const name of expectedAssets) {
            const contents = fs.readFileSync(path.join(process.env.PACKAGE, name));
            const digest = crypto.createHash('sha256').update(contents).digest('hex');
            if (checksums.get(name) !== digest || provenance.assets[name]?.sha256 !== digest ||
                provenance.assets[name]?.size !== contents.length) process.exit(2);
          }
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8').replace(/\r\n/g, '\n');
          const headings = [...changelog.matchAll(/^## \[([^\]]+)\](?: - \d{4}-\d{2}-\d{2})?\s*$/gm)];
          if (headings.some(([, heading]) => heading === 'Unreleased') === false) process.exit(2);
          const releases = headings.filter(([, heading]) => heading === process.env.VERSION);
          if (releases.length !== 1 || !releases[0][0].includes(' - ')) process.exit(2);
          const start = releases[0].index + releases[0][0].length;
          const next = changelog.indexOf('\n## ', start);
          const body = changelog.slice(start, next < 0 ? changelog.length : next).trim();
          if (!body || /^No changes yet\.?$/i.test(body)) process.exit(2);
          fs.writeFileSync(process.env.NOTES, `${body}\n`, { encoding: 'utf8', mode: 0o600, flag: 'wx' });
          NODE

      - name: Create or validate idempotent draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-gate.outputs.tag }}
          COMMIT: ${{ needs.release-gate.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/existing-release.json"
          release_error="$RUNNER_TEMP/existing-release.error"
          if gh release view "$TAG" --json tagName,isDraft,isPrerelease,assets,body >"$release_json" 2>"$release_error"; then
            RELEASE_JSON="$release_json" NOTES="$RUNNER_TEMP/release-notes.md" node <<'NODE'
          const fs = require('node:fs');
          const release = JSON.parse(fs.readFileSync(process.env.RELEASE_JSON, 'utf8'));
          const notes = fs.readFileSync(process.env.NOTES, 'utf8').trim();
          if (release.tagName !== process.env.TAG || release.isDraft !== true || release.isPrerelease !== false ||
              release.body.trim() !== notes || release.assets.length !== 0) process.exit(2);
          NODE
          else
            grep -Eiq 'HTTP 404|release not found' "$release_error"
            gh release create "$TAG" --verify-tag --draft --title "Cull $TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md" --target "$COMMIT"
          fi

      - name: Upload only verified release assets and evidence
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-gate.outputs.tag }}
          VERSION: ${{ needs.release-gate.outputs.version }}
        run: |
          gh release upload "$TAG" \
            "$RUNNER_TEMP/cull-verified/Cull_${VERSION}_aarch64.dmg" \
            "$RUNNER_TEMP/cull-verified/Cull_aarch64.app.tar.gz" \
            "$RUNNER_TEMP/cull-verified/Cull_aarch64.app.tar.gz.sig" \
            "$RUNNER_TEMP/cull-verified/latest.json" \
            "$RUNNER_TEMP/cull-verified/release-provenance.json" \
            "$RUNNER_TEMP/cull-verified/checksums.txt"

      - name: Verify uploaded release asset inventory
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-gate.outputs.tag }}
          VERSION: ${{ needs.release-gate.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$REPOSITORY/releases/tags/$TAG" > "$RUNNER_TEMP/uploaded-release.json"
          RELEASE_JSON="$RUNNER_TEMP/uploaded-release.json" PACKAGE="$RUNNER_TEMP/cull-verified" node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');
          const release = JSON.parse(fs.readFileSync(process.env.RELEASE_JSON, 'utf8'));
          const expected = [
            `Cull_${process.env.VERSION}_aarch64.dmg`, 'Cull_aarch64.app.tar.gz',
            'Cull_aarch64.app.tar.gz.sig', 'latest.json', 'release-provenance.json', 'checksums.txt',
          ].sort();
          if (release.draft !== true || JSON.stringify(release.assets.map(({ name }) => name).sort()) !== JSON.stringify(expected)) process.exit(2);
          for (const asset of release.assets) {
            const contents = fs.readFileSync(path.join(process.env.PACKAGE, asset.name));
            const digest = `sha256:${crypto.createHash('sha256').update(contents).digest('hex')}`;
            if (asset.state !== 'uploaded' || asset.size !== contents.length || asset.digest !== digest) process.exit(2);
          }
          NODE

      - name: Verify remote tag target before publication
        env:
          TAG: ${{ needs.release-gate.outputs.tag }}
          COMMIT: ${{ needs.release-gate.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git ls-remote --tags origin "refs/tags/$TAG" "refs/tags/$TAG^{}" > "$RUNNER_TEMP/remote-tag-refs"
          REFS="$RUNNER_TEMP/remote-tag-refs" node <<'NODE'
          const fs = require('node:fs');
          const lines = fs.readFileSync(process.env.REFS, 'utf8').trim().split('\n').filter(Boolean);
          if (lines.length !== 2) process.exit(2);
          const refs = new Map(lines.map((line) => line.split('\t')));
          const object = refs.get(`refs/tags/${process.env.TAG}`);
          const peeled = refs.get(`refs/tags/${process.env.TAG}^{}`);
          if (!/^[0-9a-f]{40}$/.test(object || '') || peeled !== process.env.COMMIT) process.exit(2);
          NODE

      - name: Publish the verified draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-gate.outputs.tag }}
        run: gh release edit "$TAG" --draft=false

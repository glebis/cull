[[permission]]
identifier = "app-ui"
description = "Allows UI shell commands for window management, menu state, deep-link routing, and dictation controls."
commands.allow = [
  "apply_app_icon_variant",
  "capture_agent_window_snapshot",
  "complete_agent_view_snapshot",
  "create_window",
  "drain_pending_open_params",
  "get_last_agent_view_snapshot",
  "get_preview_state",
  "get_preview_display_web_stream_status",
  "list_preview_display_monitors",
  "list_windows",
  "open_deep_link_urls",
  "open_preview_display",
  "open_with_params",
  "place_preview_display",
  "rename_window",
  "request_agent_view_snapshot",
  "send_to_window",
  "set_preview_display_always_on_top",
  "start_preview_display_web_stream",
  "start_dictation",
  "stop_preview_display_web_stream",
  "stop_dictation",
  "update_preview_state",
  "update_menu_state",
]

[[permission]]
identifier = "app-admin"
description = "Allows administrative app commands for settings, MCP tokens, jobs, privacy exports, diagnostics, and the plugin runtime bridge."
commands.allow = [
  "cancel_job",
  "create_mcp_token",
  "export_audit_log",
  "get_api_audit_log",
  "get_app_setting",
  "get_mcp_audit_log",
  "get_asset_load_events",
  "fetch_plugin_registry",
  "get_job",
  "install_plugin",
  "list_installed_plugin_info",
  "list_jobs",
  "load_installed_plugins",
  "list_mcp_tokens",
  "pause_job",
  "plugin_invoke",
  "uninstall_plugin",
  "record_asset_load_event",
  "resume_job",
  "revoke_mcp_token",
  "rotate_mcp_token",
  "set_app_setting",
  "create_catalog_field_def",
  "create_catalog_preset",
  "deprecate_catalog_field_def",
  "update_catalog_preset",
  "approve_catalog_values",
  "reject_catalog_values",
]

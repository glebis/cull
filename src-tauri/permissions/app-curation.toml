[[permission]]
identifier = "app-curation"
description = "Allows curation commands for ratings, collections, lineage, sessions, canvases, and undo."
commands.allow = [
  "add_to_collection",
  "add_to_lineage_group",
  "apply_action_proposal",
  "backfill_image_metadata",
  "convert_session_to_collection",
  "create_canvas",
  "create_collection",
  "create_lineage_group_manual",
  "create_action_proposal",
  "create_session",
  "create_smart_collection",
  "delete_canvas",
  "delete_collection",
  "delete_session",
  "delete_smart_collection",
  "dismiss_action_proposal",
  "dissolve_lineage_group",
  "get_client_feedback",
  "list_client_feedback",
  "merge_lineage_groups",
  "redo",
  "remove_from_collection",
  "remove_from_lineage_group",
  "rename_collection",
  "rename_lineage_group",
  "scan_lineage",
  "set_client_feedback",
  "set_decision",
  "set_rating",
  "attach_images_to_catalog_work",
  "create_catalog_work",
  "set_catalog_draft_value",
  "set_catalog_draft_values",
  "suggest_catalog_values",
  "undo",
  "undo_many",
  "update_canvas_layout",
  "upsert_agent_selection_preset",
  "update_smart_collection",
]

[[permission]]
identifier = "app-file-access"
description = "Allows file-system changing commands for imports, thumbnails, deletes, moves, shares, transforms, and raw previews."
commands.allow = [
  "backfill_raw_previews",
  "create_subfolder",
  "crop_image",
  "delete_folder",
  "delete_images_permanently",
  "import_files",
  "import_folder",
  "move_clipboard_capture_folder",
  "move_image",
  "open_images_with_application",
  "regenerate_single_thumbnail",
  "regenerate_thumbnails",
  "regenerate_thumbnails_by_ids",
  "rename_image",
  "rescan_sources",
  "rotate_image",
  "set_clipboard_monitor_capture_dir",
  "share_images",
  "start_clipboard_monitor",
  "stop_clipboard_monitor",
  "trash_images",
]

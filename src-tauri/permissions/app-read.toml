[[permission]]
identifier = "app-read"
description = "Allows read-only commands for browsing library state and metadata."
commands.allow = [
  "check_library_health",
  "count_smart_collection",
  "evaluate_smart_collection",
  "get_activity_context",
  "get_batch_images",
  "get_data_flow_status",
  "get_image_by_path",
  "get_image_count",
  "get_images_by_ids",
  "get_iteration_siblings",
  "get_lineage_group_images",
  "get_session",
  "get_undo_status",
  "list_canvases",
  "list_collection_images",
  "list_collections",
  "list_folders",
  "list_image_ids",
  "list_image_tags",
  "list_images",
  "list_images_by_folder",
  "list_images_filtered",
  "list_lineage_groups",
  "list_open_with_applications",
  "list_session_events",
  "list_sessions",
  "list_smart_collections",
  "list_tags",
  "list_undo_history",
  "parse_nl_query",
  "validate_session_folder",
]

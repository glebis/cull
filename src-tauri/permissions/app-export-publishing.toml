[[permission]]
identifier = "app-export-publishing"
description = "Allows export and static publishing commands."
commands.allow = [
  "apply_export_patches",
  "assemble_export_pdf",
  "create_export_manifest",
  "export_cull_exchange",
  "export_images_to_folder",
  "export_static_publish_package",
  "get_export_asset",
  "import_cull_exchange",
  "list_export_presets",
  "preview_cull_exchange_import",
  "publish_clipboard_collection",
  "save_export_image",
  "save_png_to_path",
  "save_text_to_path",
  "serve_static_publish_package",
  "stop_static_publish_server",
  "validate_export_manifest",
]
